<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Shibl Clicker</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png">
</head>
<body>

<header class="header">
<div class="logo">
<a href="index.html">Ohuelo<span>pedia</span></a>
</div>
</header>

<div class="content">

<div class="article">

<h1>Shibl Clicker</h1>

<div class="notice">
Klikaj w Shibla i zdobywaj Punkty.
</div>

<h2>Punkty</h2>

<p id="score" style="font-size:32px;">
0
</p>

<div style="text-align:center;">

<img
id="shibl"
src="images/shibl.jpg"
alt="Shibl"
style="width:300px; cursor:pointer;"
>

</div>

<h2>Osiągnięcie</h2>

<p id="achievement">
Brak
</p>

</div>

</div>

<script>
let score = 0;

let startTime = null;
let timerInterval = null;
let finished = false;

const scoreEl = document.getElementById("score");
const achievementEl = document.getElementById("achievement");
const timerEl = document.getElementById("timer");

function updateTimer() {

    if (!startTime || finished) return;

    const elapsed = Math.floor((Date.now() - startTime) / 1000);

    const hours = Math.floor(elapsed / 3600);
    const minutes = Math.floor((elapsed % 3600) / 60);
    const seconds = elapsed % 60;

    timerEl.textContent =
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");
}

document.getElementById("shibl").onclick = function() {

    if (!startTime) {

        startTime = Date.now();

        timerInterval = setInterval(updateTimer, 1000);
    }

    if (finished) return;

    score++;

    scoreEl.textContent = score;

    if(score >= 1000) {

        finished = true;

        clearInterval(timerInterval);

        achievementEl.textContent =
            "Młody Jeleń — 1000 kliknięć osiągnięte";

        return;
    }

    else if(score >= 500)
        achievementEl.textContent = "Widzieliście może zdjęcie Shibla?";

    else if(score >= 250)
        achievementEl.textContent = "Otyła Trójka";

    else if(score >= 100)
        achievementEl.textContent = "Członek Wielkiej Piątki";

    else if(score >= 50)
        achievementEl.textContent = "Znawca Ohueli";

    else if(score >= 10)
        achievementEl.textContent = "Początkujący obserwator";
};
</script>

<script src="copy-source.js"></script>

</body>
</html>
